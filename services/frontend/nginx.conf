# nginx SPA config — FRAMEWORK-OWNED REFERENCE (ADR-0022). Serves the built Vite
# `dist/` with a client-side-routing fallback. The backend is a SEPARATE origin (the
# SPA's api client calls it directly via VITE_API_URL, baked at build time) — nginx
# does NOT proxy /api here; CORS on the backend handles the cross-origin call.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Vite content-hashes assets under /assets/ → immutable, long-cache. A miss is a
  # real 404 (never fall through to index.html, or a stale bundle ref would 200).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html itself is never cached, so a new deploy is picked up on the next load.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: any unmatched route renders the app shell (client-side router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
