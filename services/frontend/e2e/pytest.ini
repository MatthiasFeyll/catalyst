[pytest]
# Business-e2e suite config (milestone-end, project ADR-0004). pytest-playwright drives
# a headless chromium (bundled in the Dockerfile.e2e image). The suite is hermetic: it
# runs against the statically built SPA and mocks any serverless-function endpoint.
addopts = --browser chromium
# Artifacts (screenshots/traces on failure) land under the writable mount.
