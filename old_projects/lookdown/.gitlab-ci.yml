stages:
  - build
  - deploy

variables:
  SHARED_PATH: /builds/$CI_PROJECT_PATH/shared

.global: &global_script
  ## set aliases for easy docker access (equivalent to .alias on a local environment [direnv is not working on gitlab-runner docker executor])
  - shopt -s expand_aliases
  - alias npm='docker run -i -v "$(pwd):/mnt" -w /mnt node npm "$@"'
  - alias php='docker exec -i --user $(id -u):$(id -g) -w /mnt lookdown_php "$@"'

############################################
#                 Build
############################################
npm:
  stage: build
  before_script:
    - *global_script
  script:
    - docker-compose -f docker/docker-compose.yml up -d --no-deps node
    - npm install
    - npm rebuild node-sass
    - npm run build

############################################
#                 Deploy
############################################
production:
  stage: deploy
  before_script:
    - *global_script
    - cd ${SHARED_PATH}
    - chmod +x ./deploy/deploy.sh
  script:
    - ./deploy/deploy.sh ${username} ${host} ${instance} ${ssh_key}
  only:
    - master
  when: manual
  allow_failure: false
